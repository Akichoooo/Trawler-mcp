name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run --extra dev python -m ruff check trawler tests scripts

      - name: Test
        run: uv run --extra dev python -m pytest -q

      - name: Compile
        run: uv run --extra dev python -m compileall -q trawler tests
